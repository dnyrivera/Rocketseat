<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Treine me</title>
  </head>
  <body>
    <div class="page">
      <!-- tag semantica para os motores de busca e organizacao -->
      <header>
        <img src="./images/logo.svg" alt="Logo da empresa Treine.me" />
        <!-- tag semantica para os motores de busca e organizacao -->
        <nav>
          <ul>
            <li>Home</li>
            <li>Sobre</li>
            <li>Treinar</li>
          </ul>
        </nav>
      </header>
      <!-- tag semantica para os motores de busca e organizacao -->
      <main>
        <section class="text">
          <h1>Treinos exclusivos para você!</h1>
          <p>
            Nós criamos treinos <strong>exclusivos e únicos para você.</strong> <br />
            Invista no seu corpo e <strong>tenha muito mais performance</strong> e qualidade de
            vida.
          </p>
          <button>
            <img src="./images/whatsapp.svg" alt="ícone do whatsapp no botão" />Comece já
          </button>
        </section>
        <img src="./images/fitness-jump.png" alt="mulher pulando corda na academia" />
      </main>
      <footer>
        <!-- tag semantica para os motores de busca e organizacao -->
        fale conosco no instagram
        <a href="http://instagram.com/treineme" target="_blank">@treine.me</a>
      </footer>
    </div>
    <img
      src="./images/balls-decoration.svg"
      alt="Bolinhas verdes no canto inferior direito da pagina"
    />
