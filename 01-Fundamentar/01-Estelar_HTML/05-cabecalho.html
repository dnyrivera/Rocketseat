<!-- <head> 
    Atributos
    - Charset
    - Viewport
    - Author
    - Description
    - Robots

-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- SEO: SEARCH ENGINA OPTIMIZATION (MOTORES DE BUSCA -> GOOGLE) -->
    <!-- Codificacao de caracteres especiais -->
    <meta charset="UTF-8" />
    <!-- Portabilidade para dispositivos mobiles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Autor da pagina  -->
    <meta name="author" content="Donny Rivera" />
    <!-- Mostra o description no Google  -->
    <meta name="description" content="Testando o Meta Description no Desenvolvimento" />
    <!-- Robo do google  -->
    <meta name="robots" content="index, follow" />
    <!-- Favicon Basico - Icone da pagina -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

    <!-- Redes Sociais -->
    <!-- Open Graph: Facebook -->
    <meta property="og:image" content="https://cdn-images-1.medium.com/max/92.jpeg" />
    <meta property="og:description" content="Texto para ser mostrado no Facebook" />
    <meta property="og:title" content="Um site da Rocketseat" />

    <!-- Twitter -->
    <meta name="twitter:title" content="Rocketseat" />

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Rocketseat</title>
  </head>
  <body></body>
</html>
